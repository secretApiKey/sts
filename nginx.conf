worker_processes auto;

events {}

http {
    map $http_upgrade $connection_upgrade {
        default upgrade;
        ''      close;
    }

    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    server {
        listen 8080;

        location /ssh {
            proxy_pass https://13.192.164.203:443/ssh;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
            proxy_set_header Host viper-889755928126.us-central1.run.app;
            proxy_ssl_server_name on;
            proxy_ssl_name adcdc.mindfreak.online;
        }

        location /ovpn {
            proxy_pass https://13.192.164.203:443/ovpn;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
            proxy_set_header Host viper-889755928126.us-central1.run.app;
            proxy_ssl_server_name on;
            proxy_ssl_name adcdc.mindfreak.online;
        }

        location /vless {
            proxy_pass https://13.192.164.203:443/vless;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
            proxy_set_header Host viper-889755928126.us-central1.run.app;
            proxy_ssl_server_name on;
            proxy_ssl_name adcdc.mindfreak.online;
        }

        location /vmess {
            proxy_pass https://13.192.164.203:443/vmess;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
            proxy_set_header Host viper-889755928126.us-central1.run.app;
            proxy_ssl_server_name on;
            proxy_ssl_name adcdc.mindfreak.online;
        }

        location / {
            return 404;
        }
    }
}
