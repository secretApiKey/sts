worker_processes auto;

events {}

http {
    resolver 8.8.8.8 ipv6=off valid=300s;

    map $http_upgrade $connection_upgrade {
        default upgrade;
        '' close;
    }

    proxy_http_version 1.1;
    proxy_buffering off;
    proxy_request_buffering off;
    proxy_read_timeout 86400;
    proxy_send_timeout 86400;

    server {
        listen 8080;

        location /ssh {
            proxy_pass https://adcdc.mindfreak.online:443/ssh;
            proxy_set_header Host viper-889755928126.us-central1.run.app;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_ssl_server_name on;
            proxy_ssl_name adcdc.mindfreak.online;
            proxy_ssl_verify off;
        }

        location /ovpn {
            proxy_pass https://adcdc.mindfreak.online:443/ovpn;
            proxy_set_header Host viper-889755928126.us-central1.run.app;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_ssl_server_name on;
            proxy_ssl_name adcdc.mindfreak.online;
            proxy_ssl_verify off;
        }

        location /vless {
            proxy_pass https://adcdc.mindfreak.online:443/vless;
            proxy_set_header Host viper-889755928126.us-central1.run.app;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
            proxy_ssl_server_name on;
            proxy_ssl_name adcdc.mindfreak.online;
            proxy_ssl_verify off;
        }

        location /vmess {
            proxy_pass https://adcdc.mindfreak.online:443/vmess;
            proxy_set_header Host viper-889755928126.us-central1.run.app;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
            proxy_ssl_server_name on;
            proxy_ssl_name adcdc.mindfreak.online;
            proxy_ssl_verify off;
        }

        location / {
            return 404;
        }
    }
}
