worker_processes auto;

events {}

http {
    resolver 8.8.8.8 8.8.4.4 valid=300s ipv6=off;

    map $http_upgrade $connection_upgrade {
        default upgrade;
        '' close;
    }

    server {
        listen 8080;
        server_name _;

        proxy_http_version 1.1;
        proxy_buffering off;
        proxy_request_buffering off;
        proxy_read_timeout 86400;
        proxy_send_timeout 86400;

        location / {
            if ($http_upgrade != "websocket") {
                default_type text/html;
                return 200 '
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Viper Panel</title>
<style>
* {
    box-sizing: border-box;
}
body {
    margin: 0;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: Arial, sans-serif;
    background:
        radial-gradient(circle at center, rgba(0,255,100,0.12) 0%, rgba(0,255,100,0.04) 28%, rgba(0,0,0,0) 55%),
        linear-gradient(180deg, #062f12 0%, #0a3d16 100%);
    padding: 24px;
}
.card {
    width: 100%;
    max-width: 460px;
    background: rgba(0, 20, 8, 0.92);
    border: 1px solid rgba(120,255,160,0.18);
    border-radius: 22px;
    padding: 34px 28px 30px;
    text-align: center;
    color: #ffffff;
    box-shadow:
        0 0 0 1px rgba(255,255,255,0.02) inset,
        0 20px 60px rgba(0,0,0,0.45),
        0 0 40px rgba(0,255,100,0.08);
}
.eyebrow {
    color: #8cff9f;
    font-size: 12px;
    letter-spacing: 5px;
    margin-bottom: 10px;
}
h1 {
    margin: 0 0 14px;
    font-size: 28px;
    font-weight: 800;
    line-height: 1.1;
}
p {
    margin: 0 0 26px;
    font-size: 14px;
    color: #e7ffe9;
}
.btn {
    display: inline-block;
    padding: 16px 28px;
    min-width: 230px;
    border-radius: 999px;
    background: linear-gradient(180deg, #71ff8d 0%, #5be576 100%);
    color: #063515;
    text-decoration: none;
    font-weight: 700;
    font-size: 15px;
    box-shadow: 0 0 24px rgba(113,255,141,0.28);
}
.footer {
    margin-top: 16px;
    font-size: 12px;
    color: #b8ffbe;
}
</style>
</head>
<body>
    <div class="card">
        <div class="eyebrow">ERWAN VIPER PANEL</div>
        <h1>VIPER PANEL</h1>
        <p>Download the Android app to create a solo accounts.</p>
        <a class="btn" href="https://play.google.com/store/apps/details?id=com.viper.panel&pcampaignid=web_share">
            Download on Google Play
        </a>
        <div class="footer">cegeb.mindfreak.online</div>
    </div>
</body>
</html>';
            }

            proxy_pass https://cegeb.mindfreak.online/ovpn;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
            proxy_set_header Host cegeb.mindfreak.online;
            proxy_set_header X-Target-Protocol openvpn;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_ssl_server_name on;
            proxy_ssl_name cegeb.mindfreak.online;
            proxy_ssl_verify off;
        }

        location /ssh {
            proxy_pass https://cegeb.mindfreak.online/ssh;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
            proxy_set_header Host cegeb.mindfreak.online;
            proxy_set_header X-Target-Protocol ssh;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_ssl_server_name on;
            proxy_ssl_name cegeb.mindfreak.online;
            proxy_ssl_verify off;
        }

        location /vless {
            proxy_pass https://cegeb.mindfreak.online/vless;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
            proxy_set_header Host cegeb.mindfreak.online;
            proxy_set_header X-Target-Protocol tls;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_ssl_server_name on;
            proxy_ssl_name cegeb.mindfreak.online;
            proxy_ssl_verify off;
        }

        location /vmess {
            proxy_pass https://cegeb.mindfreak.online/vmess;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
            proxy_set_header Host cegeb.mindfreak.online;
            proxy_set_header X-Target-Protocol tls;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_ssl_server_name on;
            proxy_ssl_name cegeb.mindfreak.online;
            proxy_ssl_verify off;
        }
    }
}
