worker_processes auto;

events {}

http {
    resolver 8.8.8.8 8.8.4.4 valid=300s ipv6=off;

    map $http_upgrade $connection_upgrade {
        default upgrade;
        ''      close;
    }

    # Incoming host -> upstream/backend domain
    map $host $backend_domain {
        default           bdgfb.erwan.fun;
        bdgfb.erwan.fun   bdgfb.erwan.fun;
        ssh.erwan.fun     ssh.erwan.fun;
        vpn.erwan.fun     vpn.erwan.fun;
        ws.erwan.fun      ws.erwan.fun;
    }

    map $uri $target_protocol {
        /ssh    ssh;
        /vless  tls;
        /vmess  tls;
        /trojan tls;
        default "";
    }

    server {
        listen 8080 default_server;
        server_name
            bdgfb.erwan.fun
            ssh.erwan.fun
            vpn.erwan.fun
            ws.erwan.fun;

        proxy_http_version 1.1;
        proxy_buffering off;
        proxy_request_buffering off;
        proxy_read_timeout 86400;
        proxy_send_timeout 86400;

        # Root path = OpenVPN
        location = / {
            proxy_pass https://$backend_domain/ovpn;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
            proxy_set_header Host $host;
            proxy_set_header X-Target-Protocol openvpn;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_ssl_server_name on;
            proxy_ssl_name $backend_domain;
            proxy_ssl_verify off;
        }

        # Merged other protocols
        location ~ ^/(ssh|vless|vmess|trojan)$ {
            proxy_pass https://$backend_domain$uri;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
            proxy_set_header Host $host;
            proxy_set_header X-Target-Protocol $target_protocol;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_ssl_server_name on;
            proxy_ssl_name $backend_domain;
            proxy_ssl_verify off;
        }
    }
}
