worker_processes auto;
events {}

http {
    resolver 8.8.8.8 8.8.4.4 valid=300s ipv6=off;

    # --------------------
    # Common proxy headers
    # --------------------
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    # --------------------
    # WebSocket helpers
    # --------------------
    map $http_upgrade $connection_upgrade {
        default upgrade;
        ''      close;
    }

    map $uri $target_protocol {
        /ssh    ssh;
        /vless  tls;
        /vmess  tls;
        /trojan tls;
        default "";
    }

    # --------------------
    # BACKEND POOL
    # --------------------
    upstream cloudrun_backends {
        server bdgfb.erwan.fun:443;
        keepalive 32;
    }

    server {
        listen 8080;
        server_name bdgfb.erwan.fun;

        proxy_http_version 1.1;
        proxy_buffering off;
        proxy_request_buffering off;
        proxy_read_timeout 86400;
        proxy_send_timeout 86400;

        location @web_root {
            root /usr/share/nginx/html;
            try_files /index.html =404;
        }

        # Root path = OpenVPN
        location = / {
            proxy_pass https://cloudrun_backends/ovpn;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
            proxy_set_header X-Target-Protocol openvpn;
            proxy_ssl_server_name on;
            proxy_ssl_name bdgfb.erwan.fun;
            proxy_ssl_verify off;
        }

        # Merged SSH / VLESS / VMESS / TROJAN
        location ~ ^/(ssh|vless|vmess|trojan)$ {
            proxy_pass https://cloudrun_backends$uri;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
            proxy_set_header X-Target-Protocol $target_protocol;
            proxy_ssl_server_name on;
            proxy_ssl_name bdgfb.erwan.fun;
            proxy_ssl_verify off;
        }

        # Web fallback
        location / {
            try_files /does-not-exist @web_root;
        }
    }
}
